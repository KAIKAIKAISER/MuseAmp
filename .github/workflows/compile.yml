name: Build MuseAmp IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        # 强制使用原作者在最新的 Actions 中肯定用的这版
        run: sudo xcode-select -s /Applications/Xcode_16.app
        
      - name: Pre-Resolve Swift Packages
        # 使用这一步强制提前下载所有依赖包。如果这一步爆红，就能真正看到是什么依赖导致了 74 错误
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace MuseAmp.xcworkspace \
            -scheme MuseAmp \
            -clonedSourcePackagesDirPath ~/.spm || true

      - name: Build Archive (Skip Signing)
        # 最精简纯净的构建命令
        run: |
          xcodebuild archive \
            -workspace MuseAmp.xcworkspace \
            -scheme MuseAmp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/MuseAmp.xcarchive \
            -clonedSourcePackagesDirPath ~/.spm \
            -skipMacroValidation \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || exit 1

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/MuseAmp.xcarchive/Products/Applications/MuseAmp.app Payload/
          zip -qr9 MuseAmp.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuseAmp-Unsigned-IPA
          path: MuseAmp.ipa
