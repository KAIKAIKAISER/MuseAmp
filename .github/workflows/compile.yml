name: Build MuseAmp IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Make
        run: brew install make

      - name: Build using Author's Native Makefile
        # 直接使用原作者的构建系统，确保环境变量完全一致，并指定打 Release(正式版)
        run: make build-ios CONFIGURATION=Release

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # 原作者的 Makefile 会把生成的 APP 放到这个自建的隐藏文件夹里，我们把它提出来
          cp -r /private/tmp/museamp-deriveddata/Build/Products/Release-iphoneos/MuseAmp.app Payload/
          zip -qr9 MuseAmp.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuseAmp-Unsigned-IPA
          path: MuseAmp.ipa
