name: Build MuseAmp IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        # 终极修复：使用作者要求的超前代际版本 Xcode 26.3，以彻底匹配 Swift 6.2
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Pre-Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace MuseAmp.xcworkspace \
            -scheme MuseAmp \
            -clonedSourcePackagesDirPath ~/.spm || true

      - name: Build Archive (Skip Signing)
        run: |
          xcodebuild archive \
            -workspace MuseAmp.xcworkspace \
            -scheme MuseAmp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/MuseAmp.xcarchive \
            -clonedSourcePackagesDirPath ~/.spm \
            -skipMacroValidation \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/MuseAmp.xcarchive/Products/Applications/MuseAmp.app Payload/
          zip -qr9 MuseAmp.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuseAmp-Unsigned-IPA
          path: MuseAmp.ipa
